<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD FOTO ENHANCER | CYBER-VISION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --primary-blue: #00e5ff;
            --dark-blue: #0056b3;
            --text-main: #1a1a2e;
            --text-muted: #5a5a72;
            --border-color: #cce0ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .cyber-container {
            background: var(--container-bg);
            border: 2px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2), inset 0 0 10px rgba(0, 229, 255, 0.1);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        .cyber-container::before {
            content: '';
            position: absolute;
            top: -5px; left: 20px; width: 40px; height: 5px; background: var(--primary-blue);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--dark-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(0, 86, 179, 0.3);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed var(--dark-blue);
            padding: 30px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 229, 255, 0.02);
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        input[type="file"] {
            display: none;
        }

        .cyber-btn {
            background: transparent;
            color: var(--dark-blue);
            border: 1px solid var(--dark-blue);
            padding: 12px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            width: 100%;
            box-shadow: inset 0 0 0 0 var(--dark-blue);
        }

        .cyber-btn:hover:not(:disabled) {
            box-shadow: inset 500px 0 0 0 var(--dark-blue);
            color: #fff;
        }

        .cyber-btn:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            display: none;
            border: 1px solid var(--primary-blue);
            padding: 10px;
            background: #fff;
        }

        .result-box img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .download-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--dark-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .download-link:hover { text-decoration: underline; }

        .info-channel {
            margin-top: 30px;
            font-size: 0.85em;
            color: var(--text-muted);
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }

        .info-channel a {
            color: var(--dark-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .info-channel a:hover {
            color: var(--primary-blue);
        }

        .loader {
            display: none;
            color: var(--dark-blue);
            margin-top: 15px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 8px var(--primary-blue); }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="cyber-container">
        <h1>HD VISION</h1>
        <p class="subtitle">AI Ultra-HD Image Enhancer</p>

        <label class="upload-area" id="drop-zone">
            <span id="file-name">Klik atau Drag & Drop foto ke sini</span>
            <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp">
        </label>

        <button class="cyber-btn" id="process-btn" disabled>Enhance Now [EXECUTE]</button>

        <div class="loader" id="loader">Processing via Wink.ai API... Please Wait</div>

        <div class="result-box" id="result-box">
            <p>Result [SUCCESS]</p>
            <img id="result-img" src="" alt="Enhanced Result">
            <br>
            <a href="" id="download-btn" class="download-link" target="_blank" download="HD_Vision_Result.jpg">>> Download HD File <<</a>
        </div>

        <div class="info-channel">
            SYS.INFO // Project Updates & Discussion<br>
            <a href="https://whatsapp.com/channel/0029Vb89VkwLNSZyIqpdbX3t" target="_blank">Join WhatsApp Channel</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const processBtn = document.getElementById('process-btn');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('result-box');
        const resultImg = document.getElementById('result-img');
        const downloadBtn = document.getElementById('download-btn');
        let base64Image = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = `[LOADED] ${file.name}`;
                processBtn.disabled = false;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64Image = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!base64Image) return;

            processBtn.disabled = true;
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/api/enhance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const data = await response.json();

                if (data.Status && data.Result_url) {
                    resultImg.src = data.Result_url;
                    downloadBtn.href = data.Result_url;
                    resultBox.style.display = 'block';
                } else {
                    alert('Error: ' + (data.Error || 'Gagal memproses gambar.'));
                }
            } catch (error) {
                alert('Terjadi kesalahan server: ' + error.message);
            } finally {
                processBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
